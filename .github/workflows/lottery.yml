name: Lao Lottery Analysis

on:
  schedule:
    - cron: "0 2 * * *"   # 09:00 ICT (before 09:30 draw)
    - cron: "0 7 * * *"   # 14:00 ICT (before 14:30 draw)
    - cron: "30 9 * * *"  # 16:30 ICT (before 17:00 draw)
  workflow_dispatch:

jobs:
  post-lottery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post lottery analysis
        run: python main.py --lottery
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
